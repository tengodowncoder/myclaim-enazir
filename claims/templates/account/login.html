{% load socialaccount %}
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk - eNazir MyClaim</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --sky-blue: #4da3ff;
            --primary-navy: #1a237e;
            --glass-bg: rgba(255, 255, 255, 0.4);
        }

        body {
            /* Background dengan sedikit gradien biru muda supaya kesan kaca nampak cantik */
            background: linear-gradient(135deg, #f4f7f6 0%, #e1f5fe 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* --- LOGIN CARD GLASSMORPHISM --- */
        .login-card {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            text-align: center;
            /* Border biru langit di bawah kad untuk selarikan dengan base.html */
            border-bottom: 4px solid var(--sky-blue);
        }

        .brand-icon {
            font-size: 4rem;
            color: var(--sky-blue);
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 5px 10px rgba(77, 163, 255, 0.2));
        }

        .brand-name {
            font-weight: 800;
            color: var(--primary-navy);
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .brand-name span {
            color: var(--sky-blue);
        }

        /* BUTANG GOOGLE TEMA SKY BLUE */
        .btn-google {
            background-color: white;
            color: var(--primary-navy);
            border: 2px solid var(--sky-blue);
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            margin-top: 20px;
        }

        .btn-google:hover {
            background-color: var(--sky-blue);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(77, 163, 255, 0.3);
        }

        .btn-google i {
            font-size: 1.4rem;
        }

        .footer-text {
            color: var(--primary-navy);
            opacity: 0.6;
            font-size: 0.8rem;
            margin-top: 30px;
        }

        .divider {
            height: 1px;
            background: rgba(26, 35, 126, 0.1);
            margin: 25px 0;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-icon">
            <i class="bi bi-shield-check"></i>
        </div>
        
        <h2 class="brand-name">MyClaim <span>eNazir</span></h2>
        <p class="text-muted small">Akses Terhad: Staf KPM Sahaja</p>
        
        <div class="divider"></div>

        <a href="{% provider_login_url 'google' %}" class="btn-google shadow-sm">
            <i class="bi bi-google me-3"></i> Log Masuk Google MOE
        </a>

        <div class="mt-4">
            <p class="small text-muted mb-1">Sila gunakan emel rasmi MOE anda.</p>
            <p class="small fw-bold" style="color: var(--primary-navy);">Tiada pendaftaran diperlukan.</p>
        </div>

        <div class="footer-text">
            © 2026 Kementerian Pendidikan Malaysia
        </div>
    </div>

</body>
</html>
