{% load socialaccount %}
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Log Masuk - eNazir MyClaim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body style="background-color: #f0f2f5; height: 100vh; display: flex; align-items: center;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 p-5">
                    <div class="mb-4">
                        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3.5rem;"></i>
                        <h2 class="fw-bold mt-2">eNazir</h2>
                        <p class="text-muted">Akses Terhad: Staf KPM Sahaja</p>
                    </div>

                    <div class="d-grid gap-2">
                        <a href="{% provider_login_url 'google' %}" class="btn btn-danger btn-lg py-3 shadow-sm">
                            <i class="bi bi-google me-2"></i> Log Masuk Google MOE
                        </a>
                    </div>

                    <div class="mt-4 pt-3 border-top">
                        <p class="small text-muted mb-0">Tiada pendaftaran diperlukan.</p>
                        <p class="small text-muted">Sila gunakan emel rasmi organisasi anda.</p>
                    </div>
                </div>
                <p class="mt-4 text-muted small">© 2026 Kementerian Pendidikan Malaysia</p>
            </div>
        </div>
    </div>
</body>
</html>
